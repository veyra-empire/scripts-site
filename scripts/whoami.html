<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>VEYRA EMPIRE whoami</title>
</head>
<body>
<!--
  Bare page loaded inside a hidden iframe by the auth-required script
  bootstrap on game sites. Reads the long-lived fingerprint marker from
  localStorage, validates its HMAC via the proxy (JSONP), and postMessages
  the current Discord ID + tier back to the parent frame. Origin-locked on
  both sides via the ?origin= query param + postMessage targetOrigin.

  Status values returned to parent:
    "ok"           - valid signed fingerprint, current tier included
    "null-session" - no fingerprint in localStorage, or proxy rejected sig
    "bad-origin"   - parent origin not in the allowlist
    "bad-nonce"    - caller supplied no nonce

  No UI chrome, never rendered visibly.
-->
<script>
(function() {
  'use strict';

  // TEMP DIAGNOSTIC: prefix all logs so they're easy to filter.
  var LOG = function() {
    var args = Array.prototype.slice.call(arguments);
    args.unshift('[whoami-diag]');
    try { console.log.apply(console, args); } catch (_) {}
  };

  var PROXY_URL = 'https://script.google.com/macros/s/AKfycbzUHg1z18WmWFSyEsZStaK2kmax2JXnPzK4LrTyEitSFVBQ2u2vfFeO6wZhjWx58EJZ7w/exec';

  // Game hosts allowed to request identity. Extend as needed.
  var ORIGIN_ALLOWLIST = [
    'https://demonicscans.org',
    'http://demonicscans.org'
  ];

  function qp(name) {
    var m = location.search.match(new RegExp('[?&]' + name + '=([^&]*)'));
    return m ? decodeURIComponent(m[1]) : '';
  }

  var nonce  = qp('nonce');
  var origin = qp('origin');
  LOG('boot', { nonce: nonce, origin: origin, href: location.href, parentSame: window.parent === window });

  function reply(status, extras) {
    LOG('reply', status, extras || null);
    if (!window.parent || window.parent === window) { LOG('reply skipped: no parent'); return; }
    var payload = { nonce: nonce, status: status };
    if (extras) {
      for (var k in extras) if (Object.prototype.hasOwnProperty.call(extras, k)) payload[k] = extras[k];
    }
    try {
      window.parent.postMessage(payload, origin || '*');
      LOG('postMessage sent to', origin || '*');
    } catch (e) {
      LOG('postMessage threw:', e && e.message);
    }
  }

  if (!nonce) { LOG('no nonce; bail'); reply('bad-nonce'); return; }
  if (!origin || ORIGIN_ALLOWLIST.indexOf(origin) < 0) { LOG('bad origin:', origin, 'allow:', ORIGIN_ALLOWLIST); reply('bad-origin'); return; }

  var raw = null;
  try { raw = localStorage.getItem('veyra_fingerprint'); } catch (e) { LOG('localStorage threw:', e && e.message); }
  LOG('raw fingerprint length:', raw ? raw.length : 0);
  if (!raw) { reply('null-session'); return; }

  var fp;
  try { fp = JSON.parse(raw); }
  catch (e) { LOG('fp parse threw:', e && e.message); reply('null-session'); return; }
  LOG('fp parsed:', { hasDiscordId: !!(fp && fp.discordId), hasSig: !!(fp && fp.sig), sigLen: fp && fp.sig && fp.sig.length, signedAt: fp && fp.signedAt });
  if (!fp || !fp.discordId || !fp.sig || !fp.signedAt) { reply('null-session'); return; }

  // JSONP verification: the proxy confirms the HMAC and returns the member's
  // current tier. Server-side is the source of truth for the tier check.
  var cb = '_vcb_' + Math.random().toString(36).slice(2);
  window[cb] = function(res) {
    LOG('JSONP callback fired:', res);
    try { delete window[cb]; } catch (_) { window[cb] = null; }
    if (res && res.ok && res.discordId && res.tier) {
      reply('ok', { discordId: res.discordId, tier: res.tier });
    } else {
      LOG('JSONP response not ok; replying null-session. res keys:', res ? Object.keys(res) : 'null');
      reply('null-session');
    }
  };
  var url = PROXY_URL + '?api=verify-fingerprint' +
            '&discordId=' + encodeURIComponent(fp.discordId) +
            '&sig='       + encodeURIComponent(fp.sig) +
            '&signedAt='  + encodeURIComponent(fp.signedAt) +
            '&callback='  + encodeURIComponent(cb);
  LOG('JSONP firing, URL length:', url.length);
  var s = document.createElement('script');
  s.src = url;
  s.onerror = function(e) {
    LOG('JSONP onerror fired');
    try { delete window[cb]; } catch (_) { window[cb] = null; }
    reply('null-session');
  };
  s.onload = function() { LOG('JSONP script onload fired'); };
  document.head.appendChild(s);
  LOG('JSONP script appended');
})();
</script>
</body>
</html>
